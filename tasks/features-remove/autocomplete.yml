---

- name: "Autocomplete : Main script"
  ansible.builtin.file: path="{{ bash_profile_d }}/bash_completion.sh" state=absent
  tags: bash

- name: "Autocomplete : Custom Scripts"
  ansible.builtin.file: path="{{ bash_paths.autocomplete }}/{{ item.name }}" state=absent
  with_items: "{{ feature['files'] | default([]) }}"
  tags: bash
