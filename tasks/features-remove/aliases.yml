---

- name: "Aliases : Main script"
  ansible.builtin.file: path="{{ bash_profile_d }}/bash_aliases.sh" state=absent
  tags: bash

- name: "Aliases : Custom Scripts"
  ansible.builtin.file: path="{{ bash_paths.aliases }}/{{ item.name }}" state=absent
  with_items: "{{ feature['files'] | default([]) }}"
  tags: bash

- name: "Aliases : Copy Back Removed Files in CentOS"
  block:

   - ansible.builtin.copy: remote_src=True src="{{ item }}" dest="{{ item }}"
     with_items:
      - /etc/profile.d/colorls.sh-ansible-unused
      - /etc/profile.d/colorls.csh-ansible-unused

   - ansible.builtin.file: path="{{ item }}" state=absent
     with_items:
      - /etc/profile.d/colorls.sh-ansible-unused
      - /etc/profile.d/colorls.csh-ansible-unused

  when: ansible_distribution == 'CentOS'
  tags: bash
