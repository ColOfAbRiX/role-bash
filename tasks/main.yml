---
- name: "Require Correct Linux Distribution"
  ansible.builtin.assert:
    that:
      (ansible_distribution == 'Ubuntu' and ansible_distribution_version is version('16.0.0', '>=')) or
      (ansible_distribution == 'Debian' and ansible_distribution_version is version('6.0.0', '>='))
    msg: "This Linux distribution '{{ ansible_distribution }} {{ ansible_distribution_version }}' is not supported by the role."
    quiet: true
  tags: bash

- name: "Load Variables"
  ansible.builtin.include_vars: "{{ lookup('first_found', files) }}"
  vars:
    files:
      - "vars/vars-{{ ansible_distribution | lower }}-{{ ansible_distribution_major_version }}.yml"
      - "vars/vars-{{ ansible_distribution | lower }}.yml"
      - "vars/vars-{{ ansible_os_family | lower }}.yml"
  tags: bash

- name: "OS Dependencies"
  ansible.builtin.package: name="{{ bash_os_dependencies[item.name] }}" state=present
  with_items:
    - { name: all, state: present }
    - "{{ bash_features }}"
  when: bash_os_dependencies[item.name] | default([]) != []
  tags: bash

- name: "PIP Dependencies"
  ansible.builtin.pip: name="{{ bash_pip_dependencies[item.name] }}" state=present executable=pip3
  with_items:
    - { name: all, state: present }
    - "{{ bash_features }}"
  when: bash_pip_dependencies[item.name] | default([]) != []
  tags: bash

- name: "Install Features"
  ansible.builtin.include_tasks: "features-install/{{ feature.name }}.yml"
  with_items:
    - { name: all, state: present }
    - "{{ bash_features }}"
  when: feature["state"] | default('') == 'present'
  loop_control:
    loop_var: feature
  tags: bash

- name: "Remove Features"
  ansible.builtin.include_tasks: "features-remove/{{ feature.name }}.yml"
  with_items:
    - { name: all, state: present }
    - "{{ bash_features }}"
  when: feature["state"] | default('') == 'absent'
  loop_control:
    loop_var: feature
  tags: bash

- name: "Drop-in Files for profile.d"
  ansible.builtin.include_tasks: drop_in.yml
  with_items:
    - "{{ bash_profile_d_scripts | default([]) }}"
  loop_control:
    loop_var: profile_script
  tags: bash

- name: "User Configuration Files"
  ansible.builtin.include_tasks: config_user.yml
  with_items:
    - "{{ bash_users | default([]) }}"
  loop_control:
    loop_var: user
  tags: bash
